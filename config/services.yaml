# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    prescription_original_directory: '%kernel.project_dir%/public/documents/originals/'
    prescription_signed_directory: '%kernel.project_dir%/public/documents/signeds/'
    prescription_original_directory_url: '/documents/originals/'
    prescription_signed_directory_url: '/documents/signeds/'
    DOCUSEAL_KEY: '%env(DSEAL_API_TOKEN)%'
    DOCUSEAL_URL: '%env(DSEAL_API_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Controller\Admin\DocusealController:
        arguments:
            $docuseal_Url: '%DOCUSEAL_URL%'
            $docuseal_Key: '%DOCUSEAL_KEY%'

    FOS\ElasticaBundle\Finder\FinderInterface $beneficiaryFinder:
        alias: fos_elastica.finder.beneficiary
    App\Controller\Gestapp\BeneficiaryController:
        tags: [ 'controller.service_arguments' ]
        public: true
        arguments:
            - '@fos_elastica.finder.beneficiary'

    FOS\ElasticaBundle\Finder\FinderInterface $prescriptionFinder:
        alias: fos_elastica.finder.prescription
    App\Controller\Gestapp\PrescriptionController:
        tags: [ 'controller.service_arguments' ]
        public: true
        arguments:
            - '@fos_elastica.finder.prescription'
